---
# Auto-provision the Prometheus datasource
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false
---
# Auto-provision dashboard folder config
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: jupyter-platform
        orgId: 1
        folder: Jupyter Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
# Multi-tenant overview dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  multi-tenant-overview.json: |
    {
      "title": "Jupyter Platform — Multi-Tenant Overview",
      "uid": "jupyter-mt-overview",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Namespace CPU Quota Usage %",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "namespace:quota_cpu_used_ratio{namespace=~\"student-.*\"} * 100",
            "legendFormat": "{{ namespace }}"
          }],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "thresholds": {
              "steps": [
                { "color": "green",  "value": 0  },
                { "color": "yellow", "value": 60 },
                { "color": "red",    "value": 80 }
              ]
            }
          },
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100 } }
        },
        {
          "id": 2,
          "title": "Namespace Memory Quota Usage %",
          "type": "bargauge",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "namespace:quota_memory_used_ratio{namespace=~\"student-.*\"} * 100",
            "legendFormat": "{{ namespace }}"
          }],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "thresholds": {
              "steps": [
                { "color": "green",  "value": 0  },
                { "color": "yellow", "value": 60 },
                { "color": "red",    "value": 80 }
              ]
            }
          },
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100 } }
        },
        {
          "id": 3,
          "title": "Node CPU Utilization %",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) by (node)) * 100",
            "legendFormat": "{{ node }}"
          }],
          "fieldConfig": { "defaults": { "unit": "percent" } }
        },
        {
          "id": 4,
          "title": "Node Memory Utilization %",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
            "legendFormat": "{{ node }}"
          }],
          "fieldConfig": { "defaults": { "unit": "percent" } }
        },
        {
          "id": 5,
          "title": "Top 10 Pods by Actual CPU Usage (millicores)",
          "type": "table",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [{
            "expr": "topk(10, sum(rate(container_cpu_usage_seconds_total{container!=\"\", namespace=~\"student-.*\"}[5m])) by (namespace, pod) * 1000)",
            "legendFormat": "{{ namespace }}/{{ pod }}",
            "instant": true
          }],
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 6,
          "title": "Top 10 Pods by Actual Memory (MiB)",
          "type": "table",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [{
            "expr": "topk(10, sum(container_memory_working_set_bytes{container!=\"\", namespace=~\"student-.*\"}) by (namespace, pod) / 1024 / 1024)",
            "legendFormat": "{{ namespace }}/{{ pod }}",
            "instant": true
          }],
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 7,
          "title": "Quota Hard Limit Reached (isolation breaches blocked)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 24, "w": 8, "h": 4 },
          "targets": [{
            "expr": "count(namespace:quota_cpu_used_ratio >= 1 or namespace:quota_memory_used_ratio >= 1) or vector(0)",
            "legendFormat": "namespaces at hard limit"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] }
            }
          }
        },
        {
          "id": 8,
          "title": "OOMKilled Containers (last 1h)",
          "type": "stat",
          "gridPos": { "x": 8, "y": 24, "w": 8, "h": 4 },
          "targets": [{
            "expr": "count(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\", namespace=~\"student-.*\"} == 1) or vector(0)",
            "legendFormat": "OOMKilled containers"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }] }
            }
          }
        },
        {
          "id": 9,
          "title": "Orphaned Namespaces (no running pods >1h)",
          "type": "stat",
          "gridPos": { "x": 16, "y": 24, "w": 8, "h": 4 },
          "targets": [{
            "expr": "count((kube_namespace_labels{namespace=~\"student-.*\"} unless on(namespace) kube_pod_status_phase{phase=\"Running\", namespace=~\"student-.*\"}) * on(namespace) group_left() ((time() - kube_namespace_created{namespace=~\"student-.*\"}) > 3600)) or vector(0)",
            "legendFormat": "orphaned"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }] }
            }
          }
        },
        {
          "id": 10,
          "title": "Storage Quota Usage by Namespace",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 6 },
          "targets": [{
            "expr": "namespace:quota_storage_used_ratio{namespace=~\"student-.*\"} * 100",
            "legendFormat": "{{ namespace }}"
          }],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "thresholds": {
              "steps": [
                { "color": "green",  "value": 0  },
                { "color": "yellow", "value": 70 },
                { "color": "red",    "value": 90 }
              ]
            }
          },
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100 } }
        }
      ]
    }
