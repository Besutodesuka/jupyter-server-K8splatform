---
# Auto-provision the Prometheus datasource
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false
---
# Auto-provision dashboard folder config
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: jupyter-platform
        orgId: 1
        folder: Jupyter Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
# Dashboards: multi-tenant overview + per-student drill-down
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  multi-tenant-overview.json: |
    {
      "title": "Jupyter Platform — Multi-Tenant Overview",
      "uid": "jupyter-mt-overview",
      "schemaVersion": 38,
      "refresh": "5s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Active Students",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 3 },
          "targets": [{
            "expr": "count(count by (namespace) (kube_pod_status_phase{phase=\"Running\", namespace=~\"student-.*\"})) or vector(0)",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "green", "value": 0 }] } } }
        },
        {
          "id": 2,
          "title": "Node CPU %",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 3 },
          "targets": [{
            "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }
            }
          }
        },
        {
          "id": 3,
          "title": "Node RAM %",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 3 },
          "targets": [{
            "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }
            }
          }
        },
        {
          "id": 4,
          "title": "Quota Hard Limits Hit",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 3 },
          "targets": [{
            "expr": "count(namespace:quota_cpu_used_ratio >= 1 or namespace:quota_memory_used_ratio >= 1) or vector(0)",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] }
            }
          }
        },
        {
          "id": 5,
          "title": "OOMKilled (last 1h)",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 3 },
          "targets": [{
            "expr": "count(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\", namespace=~\"student-.*\"} == 1) or vector(0)",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }] }
            }
          }
        },
        {
          "id": 6,
          "title": "Orphaned Namespaces",
          "type": "stat",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 3 },
          "targets": [{
            "expr": "count((kube_namespace_labels{namespace=~\"student-.*\"} unless on(namespace) kube_pod_status_phase{phase=\"Running\", namespace=~\"student-.*\"}) * on(namespace) group_left() ((time() - kube_namespace_created{namespace=~\"student-.*\"}) > 3600)) or vector(0)",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }] }
            }
          }
        },
        {
          "id": 7,
          "title": "CPU Quota Usage % per Student",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 3, "w": 12, "h": 8 },
          "targets": [{
            "expr": "namespace:quota_cpu_used_ratio{namespace=~\"student-.*\"} * 100",
            "legendFormat": "{{ namespace }}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "lineWidth": 1, "fillOpacity": 5 },
              "thresholds": {
                "steps": [
                  { "color": "green",  "value": 0  },
                  { "color": "yellow", "value": 60 },
                  { "color": "red",    "value": 80 }
                ]
              }
            }
          }
        },
        {
          "id": 8,
          "title": "Memory Quota Usage % per Student",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 3, "w": 12, "h": 8 },
          "targets": [{
            "expr": "namespace:quota_memory_used_ratio{namespace=~\"student-.*\"} * 100",
            "legendFormat": "{{ namespace }}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": { "lineWidth": 1, "fillOpacity": 5 },
              "thresholds": {
                "steps": [
                  { "color": "green",  "value": 0  },
                  { "color": "yellow", "value": 60 },
                  { "color": "red",    "value": 80 }
                ]
              }
            }
          }
        },
        {
          "id": 9,
          "title": "Actual CPU per Student (millicores)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 11, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{pod!=\"\", namespace=~\"student-.*\"}[5m])) * 1000",
            "legendFormat": "{{ namespace }}"
          }],
          "fieldConfig": { "defaults": { "unit": "none", "custom": { "lineWidth": 1 } } }
        },
        {
          "id": 10,
          "title": "Actual Memory per Student (MiB)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 11, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum by (namespace) (container_memory_working_set_bytes{pod!=\"\", namespace=~\"student-.*\"}) / 1024 / 1024",
            "legendFormat": "{{ namespace }}"
          }],
          "fieldConfig": { "defaults": { "unit": "none", "custom": { "lineWidth": 1 } } }
        },
        {
          "id": 11,
          "title": "Top 10 CPU Consumers (millicores)",
          "type": "table",
          "gridPos": { "x": 0, "y": 25, "w": 12, "h": 8 },
          "targets": [{
            "expr": "topk(10, sum(rate(container_cpu_usage_seconds_total{pod!=\"\", namespace=~\"student-.*\"}[5m])) by (namespace, pod) * 1000)",
            "legendFormat": "__auto",
            "instant": true,
            "format": "table"
          }],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true }, "renameByName": { "Value": "CPU (m)" } } }
          ],
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 12,
          "title": "Top 10 Memory Consumers (MiB)",
          "type": "table",
          "gridPos": { "x": 12, "y": 25, "w": 12, "h": 8 },
          "targets": [{
            "expr": "topk(10, sum(container_memory_working_set_bytes{pod!=\"\", namespace=~\"student-.*\"}) by (namespace, pod) / 1024 / 1024)",
            "legendFormat": "__auto",
            "instant": true,
            "format": "table"
          }],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true }, "renameByName": { "Value": "Memory (MiB)" } } }
          ],
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 13,
          "title": "Storage Quota Usage % per Student",
          "type": "bargauge",
          "gridPos": { "x": 0, "y": 39, "w": 24, "h": 6 },
          "targets": [{
            "expr": "namespace:quota_storage_used_ratio{namespace=~\"student-.*\"} * 100",
            "legendFormat": "{{ namespace }}"
          }],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "thresholds": {
              "steps": [
                { "color": "green",  "value": 0  },
                { "color": "yellow", "value": 70 },
                { "color": "red",    "value": 90 }
              ]
            }
          },
          "fieldConfig": { "defaults": { "unit": "percent", "max": 100 } }
        },
        {
          "id": 14,
          "title": "Namespace Health — Pod Ready per Student (1=up, 0=down)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 19, "w": 24, "h": 6 },
          "targets": [{
            "expr": "max by (namespace) (kube_pod_status_ready{namespace=~\"student-.*\", condition=\"true\"})",
            "legendFormat": "{{ namespace }}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "min": 0,
              "max": 1,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "thresholds": {
                "steps": [
                  { "color": "red",   "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        }
      ]
    }
  student-drilldown.json: |
    {
      "title": "Jupyter Platform — Student Drill-Down",
      "uid": "jupyter-student-drill",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "name": "namespace",
            "label": "Student Namespace",
            "options": [],
            "query": "label_values(kube_namespace_labels{namespace=~\"student-.*\"}, namespace)",
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "CPU Actual (millicores)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{pod!=\"\", namespace=\"$namespace\"}[5m])) * 1000",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 2,
          "title": "Memory Actual (MiB)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{pod!=\"\", namespace=\"$namespace\"}) / 1024 / 1024",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 3,
          "title": "CPU Quota %",
          "type": "gauge",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "namespace:quota_cpu_used_ratio{namespace=\"$namespace\"} * 100",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 60 }, { "color": "red", "value": 80 }] }
            }
          }
        },
        {
          "id": 4,
          "title": "Memory Quota %",
          "type": "gauge",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "targets": [{
            "expr": "namespace:quota_memory_used_ratio{namespace=\"$namespace\"} * 100",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 60 }, { "color": "red", "value": 80 }] }
            }
          }
        },
        {
          "id": 5,
          "title": "CPU Over Time — actual vs request vs limit",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{pod!=\"\", namespace=\"$namespace\"}[5m])) * 1000",
              "legendFormat": "actual (m)"
            },
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\", namespace=\"$namespace\"}) * 1000",
              "legendFormat": "request (m)"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{resource=\"cpu\", namespace=\"$namespace\"}) * 1000",
              "legendFormat": "limit (m)"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 6,
          "title": "Memory Over Time — actual vs request vs limit",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{pod!=\"\", namespace=\"$namespace\"}) / 1024 / 1024",
              "legendFormat": "actual (MiB)"
            },
            {
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\", namespace=\"$namespace\"}) / 1024 / 1024",
              "legendFormat": "request (MiB)"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{resource=\"memory\", namespace=\"$namespace\"}) / 1024 / 1024",
              "legendFormat": "limit (MiB)"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "none" } }
        },
        {
          "id": 7,
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": { "x": 0, "y": 12, "w": 8, "h": 4 },
          "targets": [{
            "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}) or vector(0)",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] }
            }
          }
        },
        {
          "id": 8,
          "title": "OOMKilled",
          "type": "stat",
          "gridPos": { "x": 8, "y": 12, "w": 8, "h": 4 },
          "targets": [{
            "expr": "count(kube_pod_container_status_last_terminated_reason{reason=\"OOMKilled\", namespace=\"$namespace\"} == 1) or vector(0)",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "red", "value": 1 }] }
            }
          }
        },
        {
          "id": 9,
          "title": "Storage Quota %",
          "type": "gauge",
          "gridPos": { "x": 16, "y": 12, "w": 8, "h": 4 },
          "targets": [{
            "expr": "namespace:quota_storage_used_ratio{namespace=\"$namespace\"} * 100",
            "legendFormat": ""
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] }
            }
          }
        }
      ]
    }
