apiVersion: apps/v1
kind: Deployment
metadata:
  name: lifecycle-controller
  namespace: jupyter-platform
  labels:
    app: lifecycle-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lifecycle-controller
  template:
    metadata:
      labels:
        app: lifecycle-controller
    spec:
      serviceAccountName: lifecycle-controller
      securityContext:
        runAsNonRoot: true
      containers:
        - name: controller
          # Built locally and loaded via: minikube image load lifecycle-controller:latest
          # imagePullPolicy: Never prevents Kubernetes from attempting a registry pull.
          image: lifecycle-controller:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
