apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: student-provisioner
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "delete"]

  # Per-student namespace resources
  - apiGroups: [""]
    resources:
      - resourcequotas
      - limitranges
      - persistentvolumeclaims
      - serviceaccounts
      - services
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # RBAC inside student namespaces
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # NetworkPolicy
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # Workloads
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # Pod observation (for wait/status checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Node info (for NodeIP in response URL)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
