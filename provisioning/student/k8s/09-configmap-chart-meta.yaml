apiVersion: v1
kind: ConfigMap
metadata:
  name: helm-chart-meta
  namespace: jupyter-platform
data:
  Chart.yaml: |
    apiVersion: v2
    name: jupyter-student
    description: Isolated JupyterLab environment for one student — namespace, resource limits, RBAC, network policies, persistent storage, and StatefulSet.
    type: application
    version: 1.0.0

  values.yaml: |
    studentId: ""

    image: quay.io/jupyter/scipy-notebook:2024-05-27

    dbUrl: postgresql://courseuser:coursepass123@postgres-service.jupyter-experiment.svc.cluster.local:5432/coursedb

    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
      requests:
        cpu: "250m"
        memory: "512Mi"

    quota:
      limitsCpu: "1"
      limitsMemory: "2Gi"
      requestsCpu: "500m"
      requestsMemory: "512Mi"
      storage: "10Gi"
      pods: "5"

    storage: "10Gi"

    # k3s: local-path  |  minikube: standard
    storageClassName: local-path
