studentId: ""

image: quay.io/jupyter/scipy-notebook:2024-05-27

dbUrl: postgresql://courseuser:coursepass123@postgres-service.jupyter-experiment.svc.cluster.local:5432/coursedb

# Hard limits per Jupyter pod — also enforced at the namespace level (ResourceQuota + LimitRange).
# Change cpu and memory here to adjust the hard cap for every student.
resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "250m"
    memory: "512Mi"

# Namespace-level aggregate quota (independent of per-pod limits above).
quota:
  requestsCpu: "500m"
  requestsMemory: "512Mi"
  storage: "10Gi"
  pods: "5"

storage: "10Gi"

# k3s: local-path  |  minikube: standard
storageClassName: local-path

# Lifecycle tracking — read by the lifecycle controller and deprovision.sh.
# Update these at the start of each semester before running deploy.sh.
semester: "2026-spring"
expiresAt: "2026-08-31"
