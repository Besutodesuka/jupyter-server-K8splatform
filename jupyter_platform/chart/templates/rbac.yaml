---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: student-role
  namespace: student-{{ .Values.studentId }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: student-rolebinding
  namespace: student-{{ .Values.studentId }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: student-role
subjects:
  - kind: ServiceAccount
    name: student-{{ .Values.studentId }}
    namespace: student-{{ .Values.studentId }}
