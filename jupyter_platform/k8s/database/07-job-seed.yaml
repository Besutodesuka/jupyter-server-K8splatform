apiVersion: batch/v1
kind: Job
metadata:
  name: seed-coursedb
  namespace: jupyter-experiment
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seeder
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install psycopg2-binary faker --quiet && \
              python /scripts/generate_data.py
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: seed-scripts
