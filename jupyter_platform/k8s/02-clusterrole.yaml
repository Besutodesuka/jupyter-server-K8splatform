apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: student-provisioner
rules:
  # Namespace management — patch required for Helm to apply lifecycle labels via namespace.yaml template
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "patch", "delete"]

  # Per-student namespace resources
  - apiGroups: [""]
    resources:
      - resourcequotas
      - limitranges
      - persistentvolumeclaims
      - serviceaccounts
      - secrets        # Helm stores release state as Secrets in each namespace
      - events
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # Services — must include watch to be able to grant it in student Role
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]

  # RBAC inside student namespaces
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # NetworkPolicy
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # Workloads
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]

  # Pod observation + exec/portforward (must hold these to grant them via Role)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec", "pods/portforward"]
    verbs: ["create"]

  # Node info (for NodeIP in response URL)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
